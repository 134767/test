<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>工讀時薪計算系統</title>
  <link rel="stylesheet" href="./css/style.css?v=1.6.0-budget-option-dedup-hotfix-8">
</head>
<body>
  <div id="local-runtime-guard" role="alert" hidden>Local Runtime 僅允許從本機 localhost 啟動。</div>
  <div id="local-app" hidden>
    <div class="app-container">
      <header><h1>工讀時薪計算系統 <span class="version">版本 1.6.0</span></h1></header>
      <div id="tab-bar" class="tab-bar"></div>
      <div id="main-content" class="main-content"></div>
    </div>
  </div>
  <script>
    (function () {
      var allowedHosts = ['localhost', '127.0.0.1', '::1'];
      if (!allowedHosts.includes(location.hostname)) {
        document.getElementById('local-runtime-guard').hidden = false;
        return;
      }
      window.WORK_STUDY_CONFIG = { DATA_MODE: 'localStorage' };
      document.getElementById('local-app').hidden = false;
      import('./js/app.js?v=1.6.0-budget-option-dedup-hotfix-8')
        .then(function (module) { return module.bootstrap(); })
        .catch(function (error) { console.error(error); alert('系統初始化失敗，請重新整理後再試。'); });
    }());
  </script>
</body>
</html>
