name: Deploy PTB 1.6.0 test site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify PTB 1.6.0 site
        shell: bash
        run: |
          set -euo pipefail
          test -f index.html
          test -f css/style.css
          test -f js/app.js
          test -f js/gasBridge.js
          grep -q '版本 1.6.0' index.html
          touch .nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
