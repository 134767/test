name: Deploy LCS 2.2.0 isolated runtime test

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run isolated runtime contracts
        run: npm test

  deploy:
    needs: verify
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify deployable frontend
        shell: bash
        run: |
          set -euo pipefail
          test -f index.html
          test -f css/style.css
          test -f js/app.js
          test -f js/runtime-config.js
          grep -q 'LCS 2.2.0 Isolated Runtime Test' index.html
          grep -q 'REPLACE_WITH_' js/runtime-config.js && {
            echo 'runtime-config.js still contains placeholders' >&2
            exit 1
          }
          touch .nojekyll
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
